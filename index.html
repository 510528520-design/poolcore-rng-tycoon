<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poolcore RNG Tycoon Prototype</title>
    <style>
        :root {
            --pool-blue: #0093E9;
            --pool-light: #80D0C7;
            --tile-white: #ffffff;
            --mythic-red: #ff4757;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0f7fa 0%, #80d8ff 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #2c3e50;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* 顶部状态栏 */
        #header {
            width: 100%;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            padding: 20px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            font-weight: bold;
            font-size: 1.2rem;
            flex-wrap: wrap;
            gap: 15px;
        }

        /* 核心展示区：泳池空间 */
        #pool-grid {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            grid-gap: 15px;
            margin: 40px 20px;
            padding: 20px;
            background: rgba(255,255,255,0.5);
            border: 4px solid white;
            border-radius: 10px;
        }

        .slot {
            width: 120px;
            height: 120px;
            background: #ffffff;
            border: 2px dashed #b2ebf2;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            text-align: center;
            transition: all 0.3s;
        }

        .slot.occupied {
            border: 2px solid var(--pool-blue);
            box-shadow: 0 4px 10px rgba(0,147,233,0.2);
        }

        .slot .emoji {
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .slot .name {
            font-weight: bold;
        }

        .slot .rate {
            font-size: 0.7rem;
            color: var(--pool-blue);
        }

        /* 控制区 */
        #controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        #roll-btn {
            padding: 20px 60px;
            font-size: 1.5rem;
            background-color: var(--pool-blue);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,147,233,0.3);
            transition: transform 0.1s, background 0.3s;
        }

        #roll-btn:hover {
            background-color: #007bbd;
        }

        #roll-btn:active {
            transform: scale(0.95);
        }

        #roll-result {
            margin-top: 10px;
            height: 30px;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* 商店区 */
        #shop {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .upgrade-btn {
            background: white;
            border: 2px solid var(--pool-blue);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .upgrade-btn:hover {
            background: var(--pool-blue);
            color: white;
        }

        .upgrade-btn:disabled {
            background: #ccc;
            border-color: #ccc;
            cursor: not-allowed;
            color: #999;
        }

        /* 动画与反馈 */
        .log {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 250px;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 10px;
            font-size: 0.7rem;
            border-radius: 5px;
            z-index: 100;
        }

        .log-entry {
            margin-bottom: 4px;
            padding-bottom: 4px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            #pool-grid {
                grid-template-columns: repeat(3, 100px);
                grid-gap: 10px;
                padding: 15px;
            }

            .slot {
                width: 100px;
                height: 100px;
                font-size: 0.7rem;
            }

            .slot .emoji {
                font-size: 2rem;
            }

            #header {
                font-size: 1rem;
                padding: 15px;
            }

            #roll-btn {
                padding: 15px 40px;
                font-size: 1.2rem;
            }

            .log {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="header">
        <div>水能 (Cash): <span id="cash">0</span></div>
        <div>幸运倍率: <span id="luck">x1.0</span></div>
        <div>每秒收益: <span id="mps">0</span>/s</div>
    </div>

    <div id="pool-grid">
        <div class="slot" id="s1">空位</div>
        <div class="slot" id="s2">空位</div>
        <div class="slot" id="s3">空位</div>
        <div class="slot" id="s4">空位</div>
        <div class="slot" id="s5">空位</div>
        <div class="slot" id="s6">空位</div>
    </div>

    <div id="controls">
        <div id="roll-result">准备好开始了吗？</div>
        <button id="roll-btn">ROLL!</button>
        <div id="shop">
            <button class="upgrade-btn" onclick="buyLuck()">升级幸运 (Cost: <span id="luck-cost">50</span>)</button>
        </div>
    </div>

    <div class="log" id="log">
        <div class="log-entry">游戏开始... 寻找稀有物品以增加收益。</div>
    </div>

    <script>
        // 1. 数据配置
        let cash = 0;
        let luck = 1.0;
        let luckCost = 50;
        let slots = [null, null, null, null, null, null];

        // 稀有度权重表 (越小越稀有)
        const items = [
            { name: "塑料小黄鸭", weight: 1000, income: 1, color: "#ccc", emoji: "🦆" },
            { name: "蓝色瓷砖", weight: 200, income: 5, color: "#4fc3f7", emoji: "🟦" },
            { name: "水下射灯", weight: 50, income: 20, color: "#fff176", emoji: "💡" },
            { name: "极简扶手", weight: 10, income: 100, color: "#9575cd", emoji: "🪜" },
            { name: "回声走廊", weight: 1, income: 1000, color: "#ff4757", emoji: "🌊" },
            { name: "【神话】无限池水", weight: 0.1, income: 10000, color: "#ff9f43", emoji: "✨" }
        ];

        const cashEl = document.getElementById('cash');
        const luckEl = document.getElementById('luck');
        const mpsEl = document.getElementById('mps');
        const rollResultEl = document.getElementById('roll-result');
        const logEl = document.getElementById('log');
        const luckCostEl = document.getElementById('luck-cost');

        // 2. 核心逻辑：加权随机
        function rollItem() {
            // 简单算法：越稀有的东西，受Luck提升越明显
            for (let i = items.length - 1; i >= 0; i--) {
                let chance = 1 / items[i].weight;
                if (Math.random() < (chance * luck)) {
                    return items[i];
                }
            }
            return items[0]; // 保底
        }

        // 3. 动作：Roll
        document.getElementById('roll-btn').onclick = () => {
            const result = rollItem();
            rollResultEl.innerText = `获得：${result.name}!`;
            rollResultEl.style.color = result.color;
            
            // 按钮动效
            const rollBtn = document.getElementById('roll-btn');
            rollBtn.style.transform = "scale(0.95)";
            setTimeout(() => rollBtn.style.transform = "scale(1)", 100);

            addLog(`抽到了 ${result.name} (1/${Math.round(1/ (1/result.weight))})`);
            
            // 自动放入空位（如果有的话，且收益更高）
            placeInSlot(result);
        };

        function placeInSlot(newItem) {
            // 先找空位
            let targetIndex = slots.findIndex(s => s === null);
            
            // 没有空位的话，找收益最低的替换
            if (targetIndex === -1) {
                let minIncome = Infinity;
                slots.forEach((item, index) => {
                    if (item && item.income < minIncome && item.income < newItem.income) {
                        minIncome = item.income;
                        targetIndex = index;
                    }
                });
            }

            if (targetIndex !== -1) {
                slots[targetIndex] = newItem;
                updateUI();
            } else {
                addLog("所有格子都满了，而且都是更高收益的物品~");
            }
        }

        // 4. 升级逻辑
        function buyLuck() {
            if (cash >= luckCost) {
                cash -= luckCost;
                luck += 0.5;
                luckCost = Math.floor(luckCost * 1.8);
                updateUI();
                addLog("升级成功！现在的运气更好了。");
            } else {
                addLog("水能不足！");
            }
        }

        // 5. 循环：收益计算
        setInterval(() => {
            let totalIncome = slots.reduce((sum, item) => sum + (item ? item.income : 0), 0);
            cash += totalIncome;
            updateUI();
        }, 1000);

        // 点击格子出售
        function sellItem(index) {
            const item = slots[index];
            if (!item) return;

            const sellPrice = item.income * 5;
            cash += sellPrice;
            slots[index] = null;
            addLog(`卖掉 ${item.name}，获得 ¥${sellPrice}`);
            updateUI();
        }

        function updateUI() {
            cashEl.innerText = Math.floor(cash);
            luckEl.innerText = `x${luck.toFixed(1)}`;
            luckCostEl.innerText = luckCost;
            
            // 计算每秒收益
            let totalIncome = slots.reduce((sum, item) => sum + (item ? item.income : 0), 0);
            mpsEl.innerText = totalIncome;

            // 升级按钮状态
            document.querySelector('.upgrade-btn').disabled = cash < luckCost;
            
            // 更新所有格子
            for (let i = 0; i < slots.length; i++) {
                const slotEl = document.getElementById(`s${i+1}`);
                if (slots[i]) { 
                    slotEl.innerHTML = `<b>${slots[i].name}</b><br><small>+${slots[i].income}/s</small>`; 
                    slotEl.style.backgroundColor = slots[i].color + "44"; 
                    slotEl.classList.add('occupied');
                    slotEl.onclick = () => sellItem(i);
                } else {
                    slotEl.className = "slot";
                    slotEl.textContent = "空位";
                    slotEl.style.backgroundColor = "#ffffff";
                    slotEl.onclick = null;
                }
            }
        }

        // 添加日志
        function addLog(msg) { 
            const div = document.createElement('div'); 
            div.innerText = `> ${msg}`; 
            logEl.prepend(div);
            // 保持最多20条日志
            if (logEl.children.length > 20) {
                logEl.removeChild(logEl.lastChild);
            }
        }

        // 初始化
        updateUI();
        addLog("欢迎来到Poolcore泳池大亨！点击ROLL开始游戏~");
    </script>
</body>
</html>
